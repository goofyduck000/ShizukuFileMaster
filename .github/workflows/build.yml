name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Permet de lancer manuellement depuis l'onglet Actions

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r26c
          build-tools-version: 34.0.0

      - name: Grant Execute Permission for Gradlew
        run: chmod +x ./gradlew
        # Note: On utilise le wrapper gradle généré par Android Studio normalement.
        # Ici, comme on a pas le wrapper, on va installer Gradle directement.

      - name: Install Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.5

      - name: Build Debug APK
        run: |
          cd app
          # Générer le wrapper localement pour la build
          gradle wrapper --gradle-version 8.5
          cd ..
          ./gradlew :app:assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
